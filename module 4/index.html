<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
</head>
<body>
    
<!--Block Elements-->

<h1>This is my first heading</h1>
<h2>This is my second heading</h2>

    <p>This is my first paragraph</p>

<ul>
    <li>Neapolitian Pizza</li>
    <li>Margherita Pizza</li>
    <li>Prosciutto Pizza</li>
</ul>

<!--Inline Elements-->

<img src="images/foto.png" width="200" height="200">
<a href="https://digitalschool.eu/">Digital School</a>

<cite>This is a cite element</cite>
<strong>This is a strong element</strong>
<span>This is a span element</span>

<br>
<hr>

<video width="400" height="230" controls poster="images/foto.png">

    <source src="Computer.mp4" type="video/mp4">
    <source src="Computer.ogg" type="video/ogg">
    </video>

    <audio controls>

        <source src="audio.mp3" type="audio/mpeg">
        <source src="audio.mp3" type="audio/ogg">
        Your browser does not support the audio element
    </audio>

    <br>
    <inframe src="https://digitalschool.eu/" height="600" width="1200" title="iframe example"></inframe>

    <br>
    <inframe width="500" height="315" src="https://www.youtube.com/watch?v=d86ws7mQYIg"
    title="Youtube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write 
    encrypted-media; gyroscope;
    picture






</body>
</html>
